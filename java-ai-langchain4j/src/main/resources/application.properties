# web\u670D\u52A1\u8BBF\u95EE\u7AEF\u53E3
server.port=8080


# \u7981\u7528 Tomcat APR
server.tomcat.use-apr=false

#langchain4j\u6D4B\u8BD5\u6A21\u578B
langchain4j.open-ai.chat-model.base-url=https://api.siliconflow.cn/v1
langchain4j.open-ai.chat-model.api-key=${SILICONFLOW_API_KEY}
langchain4j.open-ai.chat-model.model-name=deepseek-ai/DeepSeek-V3.2

#\u8BF7\u6C42\u548C\u54CD\u5E94\u65E5\u5FD7
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true
#\u542F\u7528\u65E5\u5FD7debug\u7EA7\u522B
#logging.level.root=debug

#ollama\u53C2\u6570
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=Qwen2.5-1.5B-Instruct
langchain4j.ollama.chat-model.temperature=0.8
langchain4j.ollama.chat-model.timeout=PT60S

#\u963F\u91CC\u4E91
#\u963F\u91CC\u767E\u70BC\u5E73\u53F0
langchain4j.community.dashscope.chat-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.chat-model.model-name=qwen-max

#MongoDB\u8FDE\u63A5\u914D\u7F6E
spring.data.mongodb.uri=mongodb://localhost:27017/chat_memory_db